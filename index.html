<!DOCTYPE html>
<html>
<head>
    <title>Pablo Homelab</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">


<style>
        /* --- DESIGN GLOBAL & DARK MODE --- */
        body {
            background-color: #2c2c2e; /* Ton fond gris foncé d'origine */
            color: #d1d1d6; /* Texte clair mais pas blanc pur pour moins de fatigue visuelle */
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h3 {
            color: #78d672; /* Titres de blocs en vert, ton vert d'origine */
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 18px;
        }

        /* --- NOTRE GRILLE DE LAYOUT PRO (Le "Moteur" Figma) --- */
        #dashboard {
            display: grid;
            /* On crée une grille à 2 colonnes comme Figma (Côté gauche / Côté droit) */
            grid-template-columns: 2fr 1fr; /* 2 parts pour la gauche, 1 part pour la droite */
            gap: 20px;
            max-width: 1200px; /* Sur PC, on limite la largeur pour le design */
            margin: 0 auto; /* Centré sur l'écran */
        }

        /* Pour mobiles, on empile tout en une colonne */
        @media (max-width: 768px) {
            #dashboard {
                grid-template-columns: 1fr;
            }
        }

        /* --- STYLE DES NOUVEAUX BLOCS (.bloc) --- */
        /* C'est la structure commune inspirée de Figma, mais "Dark/Green" */
        .bloc {
            background-color: #3a3a3c; /* Un gris légèrement plus clair que le fond */
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); /* Ombre douce comme Figma */
            border: 1px solid rgba(120, 214, 114, 0.1); /* Fine bordure verte très discrète */
        }

        /* --- STYLE DE TES CARTES DE CAPTEURS D'ORIGINE --- */
        #capteurs-block #ma-grille {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .carte {
            background-color: #78d672; /* Ton vert pomme pétant */
            color: black;
            border-radius: 15px;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
        }

        .carte p { margin: 5px 0; }

        /* --- STYLE DES ÉTATS DYNAMIQUES (Le petit plus !) --- */
        .alerte-chaud { background-color: #ff6b6b !important; color: white !important; } /* Carte rouge */
        .presence-active { color: #f9d854 !important; } /* Texte jaune pour "Présence" */

        /* --- STYLE DES NOUVEAUX BLOCS SPÉCIFIQUES --- */
        /* Bloc Météo */
        .meteo-valeur { font-size: 48px; font-weight: bold; color: white; margin: 0; }
        
        /* Bloc Documents */
        .docs-liste { list-style: none; padding: 0; margin: 0; }
        .docs-liste li { margin-bottom: 10px; }
        .docs-liste a { text-decoration: none; color: #d1d1d6; font-size: 16px; }
        .docs-liste a i { color: #78d672; margin-right: 10px; } /* Icônes en vert */
        .docs-liste a:hover { color: #78d672; } /* Au survol, le lien devient vert */

        /* Bloc Calendrier */
        .calendrier-info p { margin: 5px 0; color: #d1d1d6; }
        .calendrier-info p:first-child { font-weight: bold; color: white; }
    </style>

</head>
<body>

    <div id="dashboard">

        <div class="bloc" id="capteurs-block">
            <h3>Capteurs Bureau</h3>
            <div id="ma-grille">
                <div class="carte">
                    <p><i class="fas fa-thermometer-half"></i> Température</p>
                    <p id="valeur-temp">-- °C</p>
                </div>
                <div class="carte">
                    <p><i class="fas fa-tint"></i> Humidité</p>
                    <p id="valeur-hum">-- %</p>
                </div>
                <div class="carte">
                    <p><i class="fas fa-lightbulb"></i> Luminosité</p>
                    <p id="valeur-lum">-- lx</p>
                </div>
                <div class="carte">
                    <p><i class="fas fa-user-check"></i> Présence</p>
                    <p id="valeur-pres">--</p>
                </div>
            </div>
        </div>

        <div class="bloc" id="meteo-block">
            <h3>Météo Bréhal</h3>
            <div class="meteo-info">
                <p class="meteo-valeur" id="meteo-ext-temp">-- °C</p>
                <p id="meteo-ext-desc">Chargement...</p>
            </div>
        </div>

        <div class="bloc" id="documents-block">
            <h3>Documents Cloud</h3>
            <ul class="docs-liste">
                <li><a href="#"><i class="fas fa-file-pdf"></i> Tax Documents 2026.pdf</a></li>
                <li><a href="#"><i class="fas fa-file-invoice"></i> Insurance Policy.pdf</a></li>
                <li><a href="#"><i class="fas fa-file-excel"></i> Home Inventory.xlsx</a></li>
            </ul>
        </div>

        <div class="bloc" id="documents-block">
            <h3>Raccourcis</h3>
            <ul class="docs-liste">
                <li><a href="https://drive.google.com" target="_blank"><i class="fab fa-google-drive"></i> Google Drive</a></li>
                
                <li><a href="https://unicaenfr-my.sharepoint.com/?source=waffle" target="_blank"><i class="fas fa-cloud"></i>One Drive</a></li>
                
                <li><a href="https://github.com/pablito0750" target="_blank"><i class="fab fa-github"></i> GitHub</a></li>
                
                <li><a href="https://courtincpge.net" target="_blank"><i class="fas fa-graduation-cap"></i>Courtin CPGE</a></li>
            </ul>
        </div>

    </div>

</body>

<script>
        // Ton pseudo Adafruit
        const username = "pablito0750";

        // --- API MÉTÉO ---
        const cleMeteo = "874a77bd1d13c6d827177fc9b984b5ff"; 
        const ville = "Bréhal,fr";

        function actualiserMeteo() {
            // On fait une requête à OpenWeatherMap en demandant des degrés Celsius (metric) et en français (lang=fr)
            fetch(`https://api.openweathermap.org/data/2.5/weather?q=${ville}&appid=${cleMeteo}&units=metric&lang=fr`)
                .then(reponse => reponse.json())
                .then(donnee => {
                    // On arrondit la température pour pas avoir de virgule (ex: 22°C)
                    document.getElementById('meteo-ext-temp').innerText = Math.round(donnee.main.temp) + " °C";
                    
                    // On récupère la description (ex: "nuageux") et on met la première lettre en majuscule
                    let description = donnee.weather[0].description;
                    document.getElementById('meteo-ext-desc').innerText = description.charAt(0).toUpperCase() + description.slice(1);
                })
                .catch(erreur => console.log("Erreur météo:", erreur));
        }

        // On lance la météo au chargement de la page
        actualiserMeteo();
        
        // On actualise la météo toutes les 30 minutes (1 800 000 millisecondes) 
        // Pas besoin de le faire toutes les 10 secondes comme pour ton bureau !
        setInterval(actualiserMeteo, 1800000);

        // Adafruit

        // C'est cette fonction qui fait tout le travail
        function actualiserDonnees() {
            
         // 1. On va chercher la Température
            fetch(`https://io.adafruit.com/api/v2/${username}/feeds/temperature`)
                .then(reponse => reponse.json())
                .then(donnee => {
                    let temp = parseFloat(donnee.last_value);
                    document.getElementById('valeur-temp').innerText = temp.toFixed(1) + " °C";
                    
                    // --- LA MAGIE DYNAMIQUE ---
                    // On cible la boîte verte (le parent du texte)
                    let boiteTemp = document.getElementById('valeur-temp').parentElement;
                    
                    // Si la température dépasse 25°C, on ajoute la classe rouge !
                    if (temp > 25) {
                        boiteTemp.classList.add("alerte-chaud");
                    } else {
                        boiteTemp.classList.remove("alerte-chaud");
                    }
                });

        // 2. Humidité
        fetch(`https://io.adafruit.com/api/v2/${username}/feeds/humidite`)
            .then(reponse => reponse.json())
            .then(donnee => {
                // ICI : On utilise donnee.last_value
                document.getElementById('valeur-hum').innerText = parseFloat(donnee.last_value).toFixed(0) + " %";
            });

        // 3. Luminosité
        fetch(`https://io.adafruit.com/api/v2/${username}/feeds/luminosite`)
            .then(reponse => reponse.json())
            .then(donnee => {
                // ICI : On utilise donnee.last_value
                document.getElementById('valeur-lum').innerText = parseFloat(donnee.last_value).toFixed(0) + " lx";
            });

        // 4. Présence
        fetch(`https://io.adafruit.com/api/v2/${username}/feeds/presence`)
            .then(reponse => reponse.json())
            .then(donnee => {
                // ICI : On utilise donnee.last_value
                if (donnee.last_value === "1") {
                    document.getElementById('valeur-pres').innerText = "Oui";
                } else {
                    document.getElementById('valeur-pres').innerText = "Non";
                }
            });
        }

        // On lance la mise à jour une première fois dès l'ouverture de la page
        actualiserDonnees();
        
        // Puis on dit au navigateur de le refaire en boucle toutes les 10 secondes (10 000 millisecondes)
        setInterval(actualiserDonnees, 10000);

    </script>

</html>
